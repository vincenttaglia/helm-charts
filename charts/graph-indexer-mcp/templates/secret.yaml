{{- /*
This chart intentionally does NOT create a Secret. Sensitive env vars come from
a user-managed Secret referenced by existingSecret (see values.yaml). This guard
fails fast with a clear message instead of rendering a Deployment that mounts a
nonexistent Secret.
*/ -}}
{{- if not .Values.existingSecret }}
{{- fail "graph-indexer-mcp: existingSecret is required. Create a Secret with GRAPHMAN_AUTH_TOKEN, NETWORK_SUBGRAPH_URL, EBO_SUBGRAPH_URL, QOS_SUBGRAPH_URL (and optionally GRAPH_NODE_POSTGRES_URL), then set existingSecret to its name. See values.yaml." }}
{{- end }}
