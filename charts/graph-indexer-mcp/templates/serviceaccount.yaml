{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "graph-indexer-mcp.serviceAccountName" . }}
  labels:
    {{- include "graph-indexer-mcp.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
# k8s-rbac needs the token for TokenReview/SAR; the Deployment also opts in at
# the pod level so this is set consistently.
automountServiceAccountToken: {{ if eq .Values.config.authz "k8s-rbac" }}true{{ else }}{{ .Values.serviceAccount.automount }}{{ end }}
{{- end }}
