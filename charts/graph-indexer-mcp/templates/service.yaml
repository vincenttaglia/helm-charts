{{- if include "graph-indexer-mcp.networked" . -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "graph-indexer-mcp.fullname" . }}
  labels:
    {{- include "graph-indexer-mcp.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "graph-indexer-mcp.selectorLabels" . | nindent 4 }}
{{- end }}
