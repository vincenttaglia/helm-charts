# Default values for indexer-tools-v4.
#
# indexer-tools-v4 is a static Vue app served by nginx on port 80. At container
# start, docker-entrypoint.sh reads GRAPH_API_KEY / DRPC_API_KEY / DEFAULT_ACCOUNTS
# and (re)writes /usr/share/nginx/html/config.json and the nginx config to add a
# reverse proxy for each account's HTTP endpoints. Because of that startup
# rewrite the container needs a writable root filesystem, so readOnlyRootFilesystem
# is intentionally NOT set here.

replicaCount: 1

image:
  repository: ghcr.io/vincenttaglia/indexer-tools-v4
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  # Published tags: "latest" (main), "dev" (dev branch), "vX.Y.Z" (releases).
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

# nginx (stock image) starts as root to bind :80 and drops to the nginx user
# for workers, so runAsNonRoot is intentionally NOT set. Likewise
# readOnlyRootFilesystem is intentionally false: docker-entrypoint.sh rewrites
# /usr/share/nginx/html/config.json and /etc/nginx/conf.d/default.conf at start.
# The remaining hardening below is safe and applied by default. Override the
# whole block if you run an unprivileged nginx image.
podSecurityContext:
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL
    # nginx master needs NET_BIND_SERVICE to bind :80 as it sets up workers.
    add:
      - NET_BIND_SERVICE

# --- Application configuration -------------------------------------------------
# Non-secret runtime config, rendered into a ConfigMap.
config:
  # Pre-configured indexer accounts as a JSON array string. HTTP(S)
  # agentEndpoint / graphmanEndpoint values are auto-proxied through nginx and
  # rewritten to /api/agent/<i>/ and /api/graphman/<i>/ at container start.
  # See DEPLOYMENT.md in the app repo for the full field reference.
  defaultAccounts: |
    []

# --- API keys ------------------------------------------------------------------
# GRAPH_API_KEY / DRPC_API_KEY are optional: the app runs without them and users
# can set keys in the in-app Settings. They are *not* high-grade secrets (the
# app ships them to the browser in config.json), but the chart still keeps them
# out of the ConfigMap. Provide them via a Secret you manage and reference here.
# Leave existingSecret empty to ship no default keys.
#
#   kubectl create secret generic indexer-tools-keys \
#     --from-literal=GRAPH_API_KEY=... --from-literal=DRPC_API_KEY=...
existingSecret: ""
secretKeys:
  graphApiKey: GRAPH_API_KEY
  drpcApiKey: DRPC_API_KEY

# The container port nginx listens on. The image always serves on 80.
containerPort: 80

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false
  className: ""
  annotations: {}
    # cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: indexer-tools.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []
    # - secretName: indexer-tools-tls
    #   hosts:
    #     - indexer-tools.example.com

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

livenessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 5
  periodSeconds: 30

readinessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 3
  periodSeconds: 10

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

# Extra environment variables to set on the container.
# NOTE: VITE_* variables are build-time (baked into the static assets during
# `docker build`); setting them here has no effect at runtime.
extraEnv: []
  # - name: SOME_VAR
  #   value: "some-value"

envFrom: []
  # - configMapRef:
  #     name: extra-config

volumes: []
volumeMounts: []

nodeSelector: {}
tolerations: []
affinity: {}
